<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>49TI 游戏人格测试</title>
  <style>
    :root {
      --bg: #0d0d1a;
      --panel: #161625;
      --panel2: #1e1e35;
      --text: #e8e8f0;
      --muted: #8888aa;
      --line: #2a2a45;
      --soft: #1a1a2e;
      --accent: #7c6aff;
      --accent2: #ff6bce;
      --accent3: #6affcc;
      --accent-strong: #a89cff;
      --shadow: 0 16px 40px rgba(124,106,255,0.08);
      --radius: 22px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(124,106,255,0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%, rgba(255,107,206,0.08) 0%, transparent 50%);
      color: var(--text);
      min-height: 100vh;
    }
    .shell { max-width: 900px; margin: 0 auto; padding: 24px 16px 56px; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); }
    .hero { padding: 40px 28px; margin-top: 20px; overflow: hidden; position: relative; text-align: center; }
    .hero::before { content: ""; position: absolute; left: -80px; top: -80px; width: 240px; height: 240px; border-radius: 50%; background: radial-gradient(circle, rgba(124,106,255,0.15), transparent 70%); pointer-events: none; }
    .hero::after { content: ""; position: absolute; right: -60px; bottom: -60px; width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(circle, rgba(255,107,206,0.1), transparent 70%); pointer-events: none; }
    .eyebrow { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; color: var(--accent-strong); border: 1px solid var(--line); background: var(--soft); border-radius: 999px; padding: 8px 16px; margin-bottom: 20px; }
    h1, h2, h3, p { margin: 0; }
    .hero h1 { font-size: clamp(32px, 7vw, 60px); line-height: 1.05; letter-spacing: -0.03em; background: linear-gradient(135deg, #fff 30%, var(--accent-strong) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .hero .sub { margin-top: 16px; color: var(--muted); font-size: 15px; line-height: 1.8; max-width: 560px; margin-left: auto; margin-right: auto; }
    .type-preview { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 24px; }
    .type-chip { background: var(--panel2); border: 1px solid var(--line); border-radius: 14px; padding: 10px 16px; font-size: 13px; color: var(--muted); }
    .type-chip span { color: var(--accent-strong); font-weight: 700; }
    .hero-actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 28px; justify-content: center; }
    button { border: 0; cursor: pointer; transition: transform .16s ease, box-shadow .16s ease, opacity .16s ease; font: inherit; }
    button:hover { transform: translateY(-2px); }
    button:disabled { cursor: not-allowed; opacity: 0.4; transform: none; }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; padding: 14px 32px; border-radius: 14px; box-shadow: 0 12px 30px rgba(124,106,255,0.25); font-weight: 700; font-size: 16px; }
    .btn-secondary { background: var(--panel2); color: var(--text); padding: 14px 20px; border-radius: 14px; border: 1px solid var(--line); font-weight: 700; font-size: 14px; }
    .screen { display: none; }
    .screen.active { display: block; }
    .test-wrap, .result-wrap { margin-top: 22px; padding: 22px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    .progress { flex: 1; min-width: 180px; height: 8px; background: var(--line); border-radius: 999px; overflow: hidden; }
    .progress > span { display: block; width: 0; height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: inherit; transition: width .3s ease; }
    .progress-text { color: var(--muted); font-size: 13px; white-space: nowrap; }
    .question-list { display: grid; gap: 16px; }
    .question { border: 1px solid var(--line); border-radius: 18px; padding: 20px; background: var(--panel2); }
    .question-meta { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 12px; }
    .badge { display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; padding: 5px 10px; background: rgba(124,106,255,0.12); border: 1px solid rgba(124,106,255,0.25); color: var(--accent-strong); font-size: 11px; }
    .question-title { font-size: 16px; line-height: 1.7; color: var(--text); }
    .options { display: grid; gap: 10px; margin-top: 16px; }
    .option { display: flex; align-items: flex-start; gap: 12px; padding: 14px; border-radius: 14px; border: 1px solid var(--line); background: var(--panel); cursor: pointer; transition: border-color .16s, background .16s; }
    .option:hover { border-color: var(--accent); background: rgba(124,106,255,0.05); }
    .option.selected { border-color: var(--accent); background: rgba(124,106,255,0.1); }
    .option-code { font-weight: 800; color: var(--accent); min-width: 24px; font-size: 14px; margin-top: 1px; }
    .option-label { font-size: 14px; line-height: 1.6; color: var(--text); }
    .actions-bottom { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; margin-top: 20px; padding-top: 12px; }
    .hint { color: var(--muted); font-size: 13px; }
    .result-top { display: grid; grid-template-columns: 0.8fr 1.2fr; gap: 16px; align-items: stretch; }
    .poster-box, .type-box, .dim-box, .note-box { border: 1px solid var(--line); border-radius: 18px; padding: 20px; background: var(--panel2); }
    .poster-box { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; min-height: 280px; position: relative; overflow: hidden; }
    .poster-box::before { content: ""; position: absolute; inset: 0; background: radial-gradient(ellipse at center, rgba(124,106,255,0.08), transparent 70%); }
    .poster-image { width: 100%; max-height: 320px; object-fit: contain; border-radius: 14px; position: relative; z-index: 1; }
    .poster-caption { margin-top: 12px; color: var(--muted); font-size: 13px; position: relative; z-index: 1; }
    .type-kicker { font-size: 11px; color: var(--accent); margin-bottom: 8px; letter-spacing: .1em; text-transform: uppercase; }
    .type-name { font-size: clamp(28px, 5vw, 48px); line-height: 1.1; letter-spacing: -0.02em; background: linear-gradient(135deg, var(--accent-strong), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .type-subname { margin-top: 10px; color: var(--muted); font-size: 14px; line-height: 1.7; }
    .match { margin-top: 16px; display: inline-flex; align-items: center; gap: 8px; border-radius: 999px; padding: 8px 14px; background: rgba(124,106,255,0.1); border: 1px solid rgba(124,106,255,0.3); color: var(--accent-strong); font-weight: 700; font-size: 13px; }
    .result-layout { display: grid; gap: 16px; }
    .analysis-box { border: 1px solid var(--line); border-radius: 18px; padding: 20px; background: var(--panel2); }
    .analysis-box h3, .dim-box h3, .note-box h3 { font-size: 15px; margin-bottom: 12px; color: var(--text); }
    .analysis-box p { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.9; white-space: pre-wrap; }
    .dim-grid { display: grid; gap: 8px; }
    .dim-item { border: 1px solid var(--line); border-radius: 14px; padding: 14px; background: var(--panel); display: flex; justify-content: space-between; align-items: center; }
    .dim-item .label { font-size: 14px; color: var(--muted); }
    .dim-item .value { font-size: 18px; font-weight: 800; color: var(--accent-strong); }
    .note-box p { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.8; }
    .result-actions { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; margin-top: 20px; }
    @media (max-width: 860px) { .result-top { grid-template-columns: 1fr; } .type-preview { gap: 8px; } }
    @media (max-width: 600px) { .shell { padding: 12px 12px 42px; } .hero, .test-wrap, .result-wrap { padding: 16px; } .hero h1 { font-size: 36px; } }
  </style>
</head>
<body>
  <div class="shell">
    <section id="intro" class="screen active">
      <div class="hero card">
        <div class="eyebrow">49TI 出品</div>
        <h1>你的游戏人格是什么？</h1>
        <p class="sub">手游、云游戏全覆盖。24道题，测出你的游戏灵魂。看看你是躺平党、氪金怪，还是肝帝本帝。</p>
        <div class="type-preview">
          <div class="type-chip"><span>挂机艺术家</span> 体力溢出也不慌</div>
          <div class="type-chip"><span>月供战士</span> 648是日常早餐</div>
          <div class="type-chip"><span>好友位告急</span> 世界频道最靓的仔</div>
          <div class="type-chip"><span>六边形战神</span> 深渊满星竞技第一</div>
          <div class="type-chip"><span>随缘大师</span> 歪了就歪了</div>
          <div class="type-chip"><span>图鉴99%综合症</span> 差一个！</div>
        </div>
        <div class="hero-actions">
          <button id="startBtn" class="btn-primary">开始测试</button>
        </div>
      </div>
    </section>

    <section id="test" class="screen">
      <div class="test-wrap card">
        <div class="topbar">
          <div class="progress"><span id="progressBar"></span></div>
          <div class="progress-text" id="progressText">0 / 24</div>
        </div>
        <div id="questionList" class="question-list"></div>
        <div class="actions-bottom">
          <div class="hint" id="testHint">选择一项才能继续哦。</div>
          <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <button id="backIntroBtn" class="btn-secondary">返回首页</button>
            <button id="submitBtn" class="btn-primary" disabled>提交测试</button>
          </div>
        </div>
      </div>
    </section>

    <section id="result" class="screen">
      <div class="result-wrap card">
        <div class="result-layout">
          <div class="result-top">
            <div class="poster-box" id="posterBox">
              <img id="posterImage" class="poster-image" alt="" />
              <div id="posterCaption" class="poster-caption"></div>
            </div>
            <div class="type-box">
              <div class="type-kicker">你的游戏人格</div>
              <div class="type-name" id="resultTypeName">-</div>
              <div class="match" id="matchBadge">匹配度 0%</div>
              <div class="type-subname" id="resultTypeSub"></div>
            </div>
          </div>
          <div class="analysis-box">
            <h3>深度解读</h3>
            <p id="resultDesc"></p>
          </div>
          <div class="dim-box">
            <h3>四项维度</h3>
            <div id="dimList" class="dim-grid"></div>
          </div>
          <div class="note-box">
            <h3>温馨提示</h3>
            <p>本测试纯属娱乐，请勿将结果作为游戏队友选择、相亲择偶、游戏充值决策或人生重大选择的依据。</p>
          </div>
        </div>
        <div class="result-actions">
          <button id="restartBtn" class="btn-secondary">重新测试</button>
          <button id="toTopBtn" class="btn-primary">回到首页</button>
        </div>
      </div>
    </section>
  </div>

  <script>
    var DIM_META = {
      M: { name: '游戏动机' },
      S: { name: '社交风格' },
      C: { name: '竞技心态' },
      I: { name: '投入方式' }
    };

    var questions = [
      { id: 'q1', dim: 'M', text: '打开游戏，你最先想到的是？', options: [
        { label: '今日任务还没清，先把体力用完', value: 1 },
        { label: '看看有没有好友上线，组队开黑', value: 2 },
        { label: '新版本有什么剧情？赶紧体验', value: 3 }
      ]},
      { id: 'q2', dim: 'S', text: '游戏里有人邀请你加入工会，你的第一反应是？', options: [
        { label: '加了也是僵尸成员，算了不加了', value: 1 },
        { label: '好啊！人多热闹，一起参加活动', value: 2 },
        { label: '看工会水平怎么样，能不能带我上分', value: 3 }
      ]},
      { id: 'q3', dim: 'C', text: '看到排行榜上有人比你高，你的感受是？', options: [

        { label: '有点不服气，研究一下怎么提升', value: 2 },
        { label: '这有什么难的？充一波反杀他', value: 3 }
      ]},
      { id: 'q4', dim: 'I', text: '你通常在游戏里花多少钱？', options: [
        { label: '0元，白嫖到底，原则问题', value: 1 },
        { label: '月卡、战令，偶尔小礼包', value: 2 },
        { label: '看中的必须拿下，量力而行', value: 3 }
      ]},
      { id: 'q5', dim: 'M', text: '以下哪句最像你打游戏时会说的话？', options: [
        { label: '今天有点累，明天再说吧', value: 1 },
        { label: '你们先玩，我马上到！', value: 2 },
        { label: '这剧情也太催泪了吧，缓一缓', value: 3 }
      ]},
      { id: 'q6', dim: 'S', text: '打游戏时匹配到挂机队友，你怎么做？', options: [

        { label: '举报加拉黑，然后毫无波澜', value: 3 }
      ]},
      { id: 'q7', dim: 'C', text: '连败之后你会怎么做？', options: [
        { label: '今天运气不好，休息一下', value: 1 },
        { label: '研究攻略，下次一定赢回来', value: 2 },
        { label: '系统针对我！换号！', value: 3 }
      ]},
      { id: 'q8', dim: 'I', text: '朋友问你怎么还在玩这个游戏，你答？', options: [
        { label: '没什么就是想清一下日常', value: 1 },
        { label: '氪都氪了，不玩岂不是亏了', value: 2 },
        { label: '好不容易练到这个段位，不能掉！', value: 3 }
      ]},
      { id: 'q9', dim: 'M', text: '你为什么愿意在一款游戏里持续玩下去？', options: [

        { label: '和朋友绑在一起了，每天不开黑就难受', value: 2 },
        { label: '内容太有意思了，剧情/角色/世界观让我欲罢不能', value: 3 }
      ]},
      { id: 'q10', dim: 'S', text: '你更愿意在游戏里扮演什么角色？', options: [

        { label: '社交花蝴蝶，负责活跃气氛、带队破冰', value: 2 },
        { label: '指挥者，制定战术、协调队友、掌控节奏', value: 3 }
      ]},
      { id: 'q11', dim: 'C', text: '你打游戏主要为了什么？', options: [

      { id: 'q12', dim: 'I', text: '看到一个限时礼包，你的反应是？', options: [

        { label: '限时不买等于血亏，买！', value: 3 }

      { id: 'q13', dim: 'M', text: '新版本更新时，你最关心的是什么？', options: [
        { label: '又送了什么东西，维护补偿多不多', value: 1 },
        { label: '工会战/公会活动有没有新内容', value: 2 },
        { label: '新角色/新剧情是什么，必须第一时间体验', value: 3 }
      ]},
      { id: 'q14', dim: 'S', text: '打游戏时遇到聊得来的陌生人，你会？', options: [

    var TYPE_LIBRARY = {
      "LAZY": { code: "LAZY", cn: "挂机艺术家", intro: "体力溢出也不慌，挂机才是真信仰", desc: "你是手游界的道家学派掌门人。别人在刷副本，你在挂机；别人在冲榜，你在睡觉。你的游戏哲学是：无为而治，躺赢是最高境界。体力溢出？随它去。你的信条是：游戏是拿来放松的，不是拿来受苦的。", dims: { M: 7, S: 7, C: 6, I: 7 }},
      "CARRY": { code: "CARRY", cn: "背包客·人形外挂", intro: "不是在Carry，就是在被求Carry的路上", desc: "你是队友眼中的神队友，也是对手眼中的噩梦。你对游戏有深刻理解，操作细腻，意识一流，经常一打多带队翻盘。你享受被需要的感觉，而你的朋友经常在连败后第一个想起你。", dims: { M: 14, S: 16, C: 15, I: 12 }},
      "COTTLE": { code: "COTTLE", cn: "月供战士", intro: "648？不过是我的日常早餐", desc: "648对你来说不是钱包的呐喊，而是通往快乐的最短路。你信奉等价交换法则：时间和精力比金钱更贵。首充、双倍、限定池，你的钱包永远为信仰充值。", dims: { M: 13, S: 10, C: 13, I: 17 }},
      "SOCIAL": { code: "SOCIAL", cn: "好友位告急", intro: "世界频道最靓的仔", desc: "对你来说，游戏是一个大型社交广场。段位可以低，但工会一定要活跃；技术可以菜，但语音一定要开。你在游戏里认识的朋友比现实中还多。你是那种会在凌晨三点拉朋友起来打游戏的人。", dims: { M: 12, S: 16, C: 8, I: 11 }},
      "NOSTALGIA": { code: "NOSTALGIA", cn: "过场不跳·人", intro: "谁跳剧情我跟谁急", desc: "你是游戏里的文艺青年。对你来说，最好的游戏不是数值碾压，而是能在某个深夜让你沉默的那种。你会为了一个支线任务认真看文本，会记住每一个NPC的名字。你的眼泪经常献给CG而不是奖励。", dims: { M: 15, S: 8, C: 8, I: 13 }},
      "COLLECTOR": { code: "COLLECTOR", cn: "图鉴99%综合症", intro: "差一个，就差一个！", desc: "你是手游界的集邮爱好者。每一个新角色都要抽到手，每一个隐藏成就都要解，你像一只松鼠一样囤积着游戏里的一切。你的耐心和毅力用在收集上简直是暴殄天物——用在别的地方早成功了。", dims: { M: 14, S: 11, C: 7, I: 14 }},
      "CLOUD": { code: "CLOUD", cn: "B站通关大师", intro: "我打过了（指看别人打的）", desc: "你是云游戏时代的代表性生物。你精通所有游戏的剧情和攻略，但你的手上可能连一个游戏都没安装。你喜欢看游戏直播、视频解说，你的快乐来自围观而不是亲自下场。", dims: { M: 7, S: 11, C: 6, I: 7 }},
      "GOD": { code: "GOD", cn: "六边形战神", intro: "深渊满星 竞技场第一 有什么好说的", desc: "你不接受任何短板。技术上你能carry，社交上你能带队，充值上你从不手软，时间投入上你肝到天明。你是游戏公司最欢迎的那种用户。你的人生信条是：成年人不做选择，如果非要做，那就all in。", dims: { M: 18, S: 18, C: 18, I: 18 }},
      "SHY": { code: "SHY", cn: "别@我谢谢", intro: "自动拒绝一切组队邀请", desc: "你是游戏里的独行侠，不需要队友，不需要公会，甚至不需要聊天。对你来说，游戏是一个可以彻底关闭社交功能的避风港。你一个人刷副本，一个人打深渊，一个人看结局。安静，是你游戏世界里最美的BGM。", dims: { M: 13, S: 6, C: 12, I: 13 }},
      "FOMO": { code: "FOMO", cn: "版本受害者", intro: "不抽怕亏，抽了怕下个更强", desc: "你是版本更迭的忠实受害者。每个版本都有新内容，每个内容都要肝，每次大更都是一次新的债务周期。你永远在追赶进度，永远在拉齐落差。这是一种甜蜜的痛苦，而你甘之如饴。", dims: { M: 13, S: 11, C: 11, I: 17 }},
      "SAGE": { code: "SAGE", cn: "随缘大师", intro: "歪了就歪了 命里没有不强求", desc: "你是游戏里的禅修者，早已在得失之间达到了一种哲学平衡。输赢不重要，参与最重要。你很少在游戏里生气，也很少被坑队友激怒。你是游戏世界里最peace的存在。", dims: { M: 7, S: 10, C: 7, I: 7 }},
      "ALCOHOLIC": { code: "ALCOHOLIC", cn: "凌晨三点肝帝", intro: "今晚早睡（确信）", desc: "你是昼夜颠倒的游戏暗夜骑士。白天你是普通人，一到深夜十一点，你的游戏人格就悄然上线。你享受深夜匹配的宁静，享受凌晨三点还在线的少数人的默契。夜晚才是游戏的正确时区。", dims: { M: 8, S: 7, C: 12, I: 11 }},
      "SHARECARD": { code: "SHARECARD", cn: "专业蹭卡人", intro: "助战位放好 我来蹭了", desc: "你是游戏里的智慧型选手，擅长用最小的投入获得最大的回报。你的技术可能一般，但你非常懂得借力——借朋友的力，借版本的力，借队友的力。你是那种能躺着绝不站着，能抱大腿绝不自己爬的代表人物。", dims: { M: 7, S: 15, C: 7, I: 7 }},
      "RECHARGE": { code: "RECHARGE", cn: "氪肝双修·卷王", intro: "时间和钱包都给你了 还要我命吗", desc: "你是游戏公司财务最喜欢的用户类型——又肝又氪，双管齐下。你的月卡从不缺席，你的礼包从不放过，你的体力永远溢出。你对游戏的投入是全方位的，是的，甚至是现实钱包的噩梦。但你不后悔。", dims: { M: 12, S: 10, C: 10, I: 18 }},
      "RIVAL": { code: "RIVAL", cn: "宿敌体质", intro: "看到你ID就想打你", desc: "你是那种在游戏里有一个假想敌的人。你可能不知道对方是谁，但每次看到他的ID出现在你上方，你就会莫名兴奋。你的执念是你进步的最大动力，也是你在深夜继续排位的精神氮泵。", dims: { M: 11, S: 7, C: 17, I: 11 }},
      "GUILD_LEADER": { code: "GUILD_LEADER", cn: "催刀の团长", intro: "出刀了吗？三刀了吗？补偿刀呢？", desc: "你是游戏里的意见领袖，天生具有带队气质。你擅长发现每个人的长处，擅长调动团队氛围，擅长在逆境中鼓舞士气。你是朋友在游戏里的定心丸，也是公会频道里最活跃的那一个。", dims: { M: 12, S: 17, C: 12, I: 12 }},
      "LOYAL": { code: "LOYAL", cn: "开服活化石", intro: "当年公测我就在了", desc: "你是那种一个游戏能玩几年的钉子户玩家。别人早已退游，你还在这里；其他服务器已经鬼了，你还在默默做日常。你对游戏有感情，对角色有羁绊。你是每个游戏最珍惜的那批用户。", dims: { M: 10, S: 11, C: 7, I: 13 }},
      "MAINTENANCE": { code: "MAINTENANCE", cn: "补偿呢？", intro: "维护一分钟 补偿一小时 合理吧？", desc: "你是游戏里的理性消费者。你对游戏的关注点与众不同——别人看版本更新内容，你看补偿内容多少。每次维护、每次事故，在你眼里都是隐性福利。你的月卡购买时机精准，你的648消费克制而理智。", dims: { M: 7, S: 7, C: 7, I: 12 }},
      "STREAMER": { code: "STREAMER", cn: "零观众主播", intro: "没人看也要播 这是态度", desc: "你是游戏里的表演型人格。你打游戏的时候会忍不住想象有人在看，会对着空气做出反应，会在精彩操作后回放录像。你适合在朋友开黑时负责气氛，也适合在游戏群里发精彩集锦。", dims: { M: 12, S: 16, C: 11, I: 12 }},
      "WILDLIFE": { code: "WILDLIFE", cn: "纯野生·拒绝攻略", intro: "打不过就硬打 攻略是什么", desc: "你是游戏里的野路子选手，从不按常理出牌。你可能不知道BOSS的正确打法，但你就是死了几次然后莫名其妙过了。你充值的时候从来不看月卡划算不划算，因为你看不懂。你的游戏风格是混沌而快乐的。", dims: { M: 7, S: 7, C: 12, I: 7 }}
    };

    var state = { screen: 'intro', answers: {} };

    function showScreen(name) {
      var screens = document.querySelectorAll('.screen');
      for (var i = 0; i < screens.length; i++) {
        screens[i].classList.toggle('active', screens[i].id === name);
      }
      state.screen = name;
    }

    function updateProgress() {
      var total = questions.length;
      var answered = 0;
      for (var k in state.answers) { if (state.answers[k]) answered++; }
      var pct = total > 0 ? (answered / total) * 100 : 0;
      var bar = document.getElementById('progressBar');
      if (bar) bar.style.width = pct + '%';
      var text = document.getElementById('progressText');
      if (text) text.textContent = answered + ' / ' + total;
      var submitBtn = document.getElementById('submitBtn');
      if (submitBtn) submitBtn.disabled = answered < total;
    }

    function renderQuestions() {
      var list = document.getElementById('questionList');
      if (!list) return;
      list.innerHTML = '';
      for (var i = 0; i < questions.length; i++) {
        var q = questions[i];
        var div = document.createElement('div');
        div.className = 'question';
        var opts = '';
        for (var oi = 0; oi < q.options.length; oi++) {
          var opt = q.options[oi];
          var sel = state.answers[q.id] === opt.value ? ' selected' : '';
          var code = String.fromCharCode(65 + oi);
          opts += '<div class="option' + sel + '" data-qid="' + q.id + '" data-val="' + opt.value + '">' +
            '<span class="option-code">' + code + '</span>' +
            '<span class="option-label">' + opt.label + '</span></div>';
        }
        div.innerHTML = '<div class="question-meta">' +
          '<span class="badge">' + (DIM_META[q.dim] ? DIM_META[q.dim].name : q.dim) + '</span>' +
          '<span>' + (i + 1) + ' / ' + questions.length + '</span></div>' +
          '<div class="question-title">' + q.text + '</div>' +
          '<div class="options">' + opts + '</div>';
        list.appendChild(div);
      }
      var options = list.querySelectorAll('.option');
      for (var j = 0; j < options.length; j++) {
        options[j].addEventListener('click', (function(el) {
          return function() {
            var qid = el.getAttribute('data-qid');
            var val = parseInt(el.getAttribute('data-val'));
            state.answers[qid] = val;
            var siblings = el.parentElement.querySelectorAll('.option');
            for (var k = 0; k < siblings.length; k++) siblings[k].classList.remove('selected');
            el.classList.add('selected');
            updateProgress();
          };
        })(options[j]));
      }
    }

    function calculateScore() {
      var scores = { M: 0, S: 0, C: 0, I: 0 };
      for (var i = 0; i < questions.length; i++) {
        var q = questions[i];
        if (state.answers[q.id]) scores[q.dim] += state.answers[q.id];
      }
      return scores;
    }

    function findBestType(scores) {
      var bestType = null;
      var bestDiff = Infinity;
      var types = Object.keys(TYPE_LIBRARY);
      for (var i = 0; i < types.length; i++) {
        var type = TYPE_LIBRARY[types[i]];
        var diff = Math.abs(type.dims.M - scores.M) +
                   Math.abs(type.dims.S - scores.S) +
                   Math.abs(type.dims.C - scores.C) +
                   Math.abs(type.dims.I - scores.I);
        if (diff < bestDiff) { bestDiff = diff; bestType = type; }
      }
      return { type: bestType, diff: bestDiff };
    }

    function showResult() {
      var scores = calculateScore();
      var result = findBestType(scores);
      var type = result.type;
      var match = Math.round(Math.max(0, (1 - result.diff / 48) * 100));

      document.getElementById('resultTypeName').textContent = type.cn;
      document.getElementById('resultTypeSub').textContent = type.intro;
      document.getElementById('resultDesc').textContent = type.desc;
      document.getElementById('matchBadge').textContent = '匹配度 ' + match + '%';

      var dimNames = { M: '游戏动机', S: '社交风格', C: '竞技心态', I: '投入方式' };
      var dimList = document.getElementById('dimList');
      dimList.innerHTML = '';
      for (var k in scores) {
        var item = document.createElement('div');
        item.className = 'dim-item';
        item.innerHTML = '<span class="label">' + (dimNames[k] || k) + '</span><span class="value">' + scores[k] + '分</span>';
        dimList.appendChild(item);
      }

      var posterBox = document.getElementById('posterBox');
      var img = document.getElementById('posterImage');
      var caption = document.getElementById('posterCaption');
      var imgFile = 'image/' + type.code + '.png';
      img.onerror = function() { posterBox.classList.add('no-image'); img.style.display = 'none'; caption.textContent = type.intro; };
      img.onload = function() { posterBox.classList.remove('no-image'); img.style.display = ''; caption.textContent = ''; };
      img.src = imgFile;
      caption.textContent = type.intro;

      showScreen('result');
    }

    document.getElementById('startBtn').addEventListener('click', function() {
      state.answers = {};
      renderQuestions();
      updateProgress();
      showScreen('test');
    });

    document.getElementById('backIntroBtn').addEventListener('click', function() { showScreen('intro'); });
    document.getElementById('toTopBtn').addEventListener('click', function() { showScreen('intro'); });
    document.getElementById('restartBtn').addEventListener('click', function() {
      state.answers = {};
      renderQuestions();
      updateProgress();
      showScreen('test');
    });
    document.getElementById('submitBtn').addEventListener('click', function() {
      var answered = 0;
      for (var k in state.answers) { if (state.answers[k]) answered++; }
      if (answered >= questions.length) showResult();
    });
  </script>
</body>
</html>
